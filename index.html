
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descubra Seu Perfume Ideal</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#f8d7ff,#ffe7c7);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            width:90%;
            max-width:600px;
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            margin-bottom:20px;
        }

        form{
            display:flex;
            flex-direction:column;
            gap:12px;
        }

        label{
            background:#f5f5f5;
            padding:12px;
            border-radius:10px;
            cursor:pointer;
        }

        button{
            margin-top:15px;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#8b5cf6;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#6d28d9;
        }

        #resultado{
            margin-top:25px;
            padding:20px;
            border-radius:10px;
            background:#fafafa;
            display:none;
        }

        img{
            width:100%;
            border-radius:12px;
            margin-bottom:15px;
        }
    </style>
</head>

<body>

<div class="container">

    <img src="images.jpeg" alt="Perfume">

    <h1>Descubra Seu Perfume Ideal</h1>
    <p>Escolha as notas que mais combinam com você:</p>

    <form id="quiz">

        <label><input type="checkbox" value="floral"> Floral</label>
        <label><input type="checkbox" value="citrico"> Cítrico</label>
        <label><input type="checkbox" value="amadeirado"> Amadeirado</label>
        <label><input type="checkbox" value="oriental"> Oriental</label>
        <label><input type="checkbox" value="doce"> Doce/Gourmand</label>
        <label><input type="checkbox" value="aquatico"> Aquático</label>

        <button type="submit">Descobrir</button>
    </form>

    <div id="resultado"></div>

</div>

<script>
const perfis = {
    floral: {
        titulo: "Perfil Floral Elegante",
        descricao: "Você gosta de perfumes delicados, românticos e sofisticados.",
        notas: "Rosa, Jasmim, Peônia e Lírio."
    },
    citrico: {
        titulo: "Perfil Cítrico Energético",
        descricao: "Você busca frescor e leveza.",
        notas: "Bergamota, Limão Siciliano e Mandarina."
    },
    amadeirado: {
        titulo: "Perfil Amadeirado Sofisticado",
        descricao: "Você prefere perfumes marcantes e elegantes.",
        notas: "Cedro, Sândalo e Vetiver."
    },
    oriental: {
        titulo: "Perfil Oriental Sedutor",
        descricao: "Você gosta de fragrâncias intensas e envolventes.",
        notas: "Baunilha, Âmbar e Especiarias."
    },
    doce: {
        titulo: "Perfil Gourmand",
        descricao: "Você aprecia aromas doces e confortáveis.",
        notas: "Caramelo, Chocolate e Baunilha."
    },
    aquatico: {
        titulo: "Perfil Aquático",
        descricao: "Você gosta de sensação de limpeza e liberdade.",
        notas: "Notas marinhas, algas e brisa oceânica."
    }
};

document.getElementById("quiz").addEventListener("submit", function(e){
    e.preventDefault();

    const selecionados = Array.from(
        document.querySelectorAll("input:checked")
    ).map(el => el.value);

    const area = document.getElementById("resultado");
    area.style.display = "block";

    if (selecionados.length === 0) {
        area.innerHTML = "<h2>Selecione pelo menos uma nota.</h2>";
        return;
    }

    const principal = selecionados[0];
    const perfil = perfis[principal];

    if (!perfil) {
        area.innerHTML = "<h2>Perfil nao encontrado.</h2>";
        return;
    }

    area.innerHTML = `
        <h2>${perfil.titulo}</h2>
        <p>${perfil.descricao}</p>
        <strong>Notas recomendadas:</strong>
        <p>${perfil.notas}</p>
    `;
});
</script>

</body>
</html>
